name: EPİAŞ PTF - main.py

on:
  schedule:
    # Her 3 saatte bir (gece dahil, gün boyu)
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ptf-cek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Paketleri kur
        run: pip install --quiet eptr2 twilio requests

      - name: main.py çalıştır
        env:
          EPIAS_KULLANICI: ${{ secrets.EPIAS_KULLANICI }}
          EPIAS_SIFRE: ${{ secrets.EPIAS_SIFRE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          F2POOL_TOKEN: ${{ secrets.F2POOL_TOKEN }}
          F2POOL_KULLANICI: mehmetas
        run: python main.py
