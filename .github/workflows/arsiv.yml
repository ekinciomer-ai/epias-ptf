name: Otocoin Veri Arsivi

on:
  schedule:
    # Her saat basinda (gece dahil, 7/24)
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  arsivle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Arsiv kaydet
        env:
          F2POOL_TOKEN: ${{ secrets.F2POOL_TOKEN }}
          F2POOL_KULLANICI: mehmetas
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ekinciomer-ai/epias-ptf
        run: python arsiv_kaydet.py
