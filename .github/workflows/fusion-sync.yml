name: 🌞 FusionSolar Data Sync

# Her 10 dakikada bir çalışır, fusion_data.json'u günceller
on:
  schedule:
    - cron: '*/10 * * * *'  # her 10 dakikada
  workflow_dispatch:  # manuel tetikleme için

jobs:
  fetch-fusion-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # repo'ya yazma izni

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run fusion_solar.py
        env:
          FUSION_USER: ${{ secrets.FUSION_USER }}
          FUSION_PASS: ${{ secrets.FUSION_PASS }}
          FUSION_BASE_URL: ${{ secrets.FUSION_BASE_URL }}
        run: python fusion_solar.py

      - name: Commit & push fusion_data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fusion_data.json
          git diff --staged --quiet || git commit -m "🌞 fusion data update [$(date -u +%H:%M)]"
          git push
